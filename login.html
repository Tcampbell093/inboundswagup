<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Houston Control — Sign In</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0a1628 0%,#0f2444 60%,#1a3a5c 100%);
    font-family:Inter,system-ui,sans-serif;
  }
  .card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;padding:48px 40px;
    width:100%;max-width:400px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
    box-shadow:0 24px 64px rgba(0,0,0,.4);
    backdrop-filter:blur(12px);
  }
  .logo{width:72px;height:72px;object-fit:contain;border-radius:16px;}
  h1{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;}
  .sub{font-size:14px;color:rgba(255,255,255,.5);font-weight:500;}
  .google-btn{
    margin-top:8px;
    display:flex;align-items:center;gap:12px;
    background:#fff;color:#1f1f1f;
    border:none;border-radius:12px;
    padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;
    width:100%;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:background .15s;
  }
  .google-btn:hover{background:#f5f5f5;}
  .google-btn:disabled{opacity:.6;cursor:not-allowed;}
  .notice{font-size:12px;color:rgba(255,255,255,.35);text-align:center;line-height:1.6;}
  .status{font-size:14px;color:rgba(255,255,255,.7);text-align:center;min-height:20px;}
  .error{color:#ff6b6b;}
</style>
</head>
<body>
<div class="card">
  <img src="assets/houston-control-logo-left.png" alt="Houston Control" class="logo">
  <h1>Houston Control</h1>
  <p class="sub">Warehouse Operations Hub</p>
  <button class="google-btn" id="loginBtn">
    <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>
  <p class="status" id="status"></p>
  <p class="notice">Access is by invitation only.<br>Contact your manager if you need access.</p>
</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
(function() {
  const API_URL = 'https://inboundswagup.netlify.app/.netlify/identity';
  const USER_KEY = 'qaWorkflowCurrentUserV2';
  const HC_USER_KEY = 'hcAuthUser';

  const loginBtn = document.getElementById('loginBtn');
  const status   = document.getElementById('status');

  function setStatus(msg, isError) {
    status.textContent = msg;
    status.className = 'status' + (isError ? ' error' : '');
  }

  // ── Handle token in URL hash (after OAuth redirect) ──────────
  const hash = window.location.hash;
  if (hash.includes('access_token=')) {
    setStatus('Signing you in…');
    loginBtn.disabled = true;

    const params = new URLSearchParams(hash.replace(/^#/, ''));
    const token  = params.get('access_token');

    fetch(API_URL + '/user', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(r => r.json())
    .then(function(user) {
      if (!user || !user.email) throw new Error('No user data');

      const name = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || user.email;

      // Fetch role from Neon DB
      return fetch('/.netlify/functions/users?action=upsert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: user.id, email: user.email, name: name })
      })
      .then(r => r.json())
      .then(function(dbUser) {
        if (dbUser.suspended) throw new Error('Your account has been suspended. Contact your manager.');

        if (dbUser.unauthorized) {
          fetch(API_URL + '/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(function(){});
          localStorage.removeItem(HC_USER_KEY);
          localStorage.removeItem(USER_KEY);
          throw new Error('This Google account doesn\'t have access to Houston Control. Ask your manager to invite you.');
        }

        localStorage.setItem(USER_KEY, name);
        localStorage.setItem(HC_USER_KEY, JSON.stringify({
          id: user.id, email: user.email, name: name,
          role:      dbUser.role || 'l1',
          overrides: dbUser.overrides || {},
          tempAdmin: dbUser.tempAdmin || false,
          token: token
        }));

        setStatus('Signed in as ' + name + '. Redirecting…');
        window.location.href = 'index.html#homePage';
      });
    })
    .catch(function(err) {
      setStatus(err.message || 'Sign in failed. Please try again.', true);
      loginBtn.disabled = false;
      history.replaceState(null, '', 'login.html');
    });

  // Show message if redirected here due to unauthorized access
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('reason') === 'unauthorized') {
    setStatus("This Google account doesn\'t have access to Houston Control. Ask your manager to invite you.", true);
  }

  } else {
    // ── Normal login button ───────────────────────────────────
    loginBtn.addEventListener('click', function() {
      setStatus('Redirecting to Google…');
      loginBtn.disabled = true;
      const redirectTo = encodeURIComponent(window.location.origin + '/login.html');
      window.location.href = API_URL + '/authorize?provider=google&redirect_to=' + redirectTo;
    });
  }
})();
</script>
</body>
</html>
